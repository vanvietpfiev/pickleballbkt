<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giải Pickleball Ban Kỹ Thuật — Vietnam Airlines</title>
    <meta name="description" content="Ứng dụng quản lý giải Pickleball nội bộ Ban Kỹ Thuật - Vietnam Airlines. Chia đội, lịch đấu, cập nhật kết quả.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏓</text></svg>">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="brand-logo">
                <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" class="lotus-icon">
                    <path d="M24 4C24 4 18 12 18 20C18 24 20 28 24 30C28 28 30 24 30 20C30 12 24 4 24 4Z" fill="var(--accent)" opacity="0.9"/>
                    <path d="M12 14C12 14 10 22 14 28C16 31 20 32 24 30C22 26 22 22 24 18C20 16 14 14 12 14Z" fill="var(--accent)" opacity="0.7"/>
                    <path d="M36 14C36 14 38 22 34 28C32 31 28 32 24 30C26 26 26 22 24 18C28 16 34 14 36 14Z" fill="var(--accent)" opacity="0.7"/>
                    <path d="M6 22C6 22 8 30 14 34C18 36 22 34 24 30C20 28 16 26 14 22C10 22 6 22 6 22Z" fill="var(--accent)" opacity="0.5"/>
                    <path d="M42 22C42 22 40 30 34 34C30 36 26 34 24 30C28 28 32 26 34 22C38 22 42 22 42 22Z" fill="var(--accent)" opacity="0.5"/>
                    <ellipse cx="24" cy="38" rx="10" ry="3" fill="var(--accent)" opacity="0.3"/>
                </svg>
            </div>
            <div class="brand-text">
                <span class="brand-title">BAN KỸ THUẬT</span>
                <span class="brand-subtitle">Vietnam Airlines</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <button class="nav-item active" data-tab="dashboard" id="nav-dashboard">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                <span>Tổng Quan</span>
            </button>
            <button class="nav-item" data-tab="players" id="nav-players">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span>VĐV</span>
            </button>
            <button class="nav-item" data-tab="teams" id="nav-teams">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                <span>Chia Đội</span>
            </button>
            <button class="nav-item" data-tab="bracket" id="nav-bracket">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="8" height="4" rx="1"/><rect x="14" y="3" width="8" height="4" rx="1"/><rect x="2" y="17" width="8" height="4" rx="1"/><rect x="14" y="17" width="8" height="4" rx="1"/><path d="M6 7v4h12V7"/><path d="M6 17v-4h12v4"/><line x1="12" y1="11" x2="12" y2="13"/></svg>
                <span>Bảng Đấu</span>
            </button>
            <button class="nav-item" data-tab="scoring" id="nav-scoring">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
                <span>Kết Quả</span>
            </button>
            <button class="nav-item" data-tab="standings" id="nav-standings">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5C7 4 7 7 7 7"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5C17 4 17 7 17 7"/><path d="M4 22h16"/><path d="M10 22V2h4v20"/><path d="M8 9h8l-1 13H9L8 9z"/></svg>
                <span>Xếp Hạng</span>
            </button>
        </nav>

        <div class="sidebar-footer">
            <button class="btn-reset" id="btn-reset-all" title="Reset toàn bộ dữ liệu">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                <span>Reset Giải Đấu</span>
            </button>
        </div>
    </aside>

    <!-- Mobile Header -->
    <header class="mobile-header" id="mobile-header">
        <button class="hamburger" id="hamburger-btn" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
        <h1 class="mobile-title">Giải Pickleball BKT</h1>
    </header>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
        <!-- Header -->
        <header class="content-header">
            <div class="header-left">
                <h1 class="page-title" id="page-title">Tổng Quan</h1>
                <p class="page-subtitle" id="page-subtitle">Giải Pickleball Ban Kỹ Thuật 2026</p>
            </div>
            <div class="header-right">
                <div class="tournament-badge">
                    <span class="badge-dot"></span>
                    <span id="tournament-status">Chưa bắt đầu</span>
                </div>
            </div>
        </header>

        <!-- Tab Contents -->
        <div class="tab-content active" id="tab-dashboard">
            <div class="dashboard-grid">
                <div class="stat-card stat-players">
                    <div class="stat-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-number" id="stat-total-players">0</span>
                        <span class="stat-label">VĐV đăng ký</span>
                    </div>
                </div>
                <div class="stat-card stat-teams">
                    <div class="stat-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-number" id="stat-total-teams">0</span>
                        <span class="stat-label">Đội thi đấu</span>
                    </div>
                </div>
                <div class="stat-card stat-matches">
                    <div class="stat-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="8" height="4" rx="1"/><rect x="14" y="3" width="8" height="4" rx="1"/><rect x="2" y="17" width="8" height="4" rx="1"/><rect x="14" y="17" width="8" height="4" rx="1"/><path d="M6 7v4h12V7"/><path d="M6 17v-4h12v4"/></svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-number" id="stat-total-matches">0</span>
                        <span class="stat-label">Trận đấu</span>
                    </div>
                </div>
                <div class="stat-card stat-completed">
                    <div class="stat-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-number" id="stat-completed-matches">0</span>
                        <span class="stat-label">Đã hoàn thành</span>
                    </div>
                </div>
            </div>

            <div class="dashboard-sections">
                <div class="card quick-actions-card">
                    <h3 class="card-title">Bắt Đầu Nhanh</h3>
                    <div class="quick-actions">
                        <button class="action-btn" data-goto="players">
                            <span class="action-icon">1</span>
                            <span class="action-text">Thêm VĐV</span>
                        </button>
                        <button class="action-btn" data-goto="teams">
                            <span class="action-icon">2</span>
                            <span class="action-text">Chia Đội</span>
                        </button>
                        <button class="action-btn" data-goto="bracket">
                            <span class="action-icon">3</span>
                            <span class="action-text">Tạo Bảng Đấu</span>
                        </button>
                        <button class="action-btn" data-goto="scoring">
                            <span class="action-icon">4</span>
                            <span class="action-text">Nhập Kết Quả</span>
                        </button>
                    </div>
                </div>

                <div class="card recent-results-card">
                    <h3 class="card-title">Kết Quả Gần Đây</h3>
                    <div id="recent-results" class="recent-results">
                        <p class="empty-state">Chưa có kết quả nào</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="tab-content" id="tab-players"></div>
        <div class="tab-content" id="tab-teams"></div>
        <div class="tab-content" id="tab-bracket"></div>
        <div class="tab-content" id="tab-scoring"></div>
        <div class="tab-content" id="tab-standings"></div>
    </main>

    <!-- Celebration Overlay -->
    <div class="celebration-overlay" id="celebration-overlay" style="display:none;">
        <div class="celebration-content" id="celebration-content"></div>
    </div>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modal-overlay" style="display:none;">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title"></h3>
                <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <!-- Canvas for confetti -->
    <canvas id="confetti-canvas"></canvas>

    <script src="js/store.js"></script>
    <script src="js/helpers.js"></script>
    <script src="js/players.js"></script>
    <script src="js/teams.js"></script>
    <script src="js/bracket.js"></script>
    <script src="js/scoring.js"></script>
    <script src="js/standings.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
